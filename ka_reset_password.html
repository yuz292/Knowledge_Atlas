<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password · Knowledge Atlas</title>
<style>
:root{--navy:#1C3D3A;--teal:#2A7868;--amber:#E8872A;--cream:#F7F4EF;--gold:#F5A623}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:var(--cream);color:var(--navy);min-height:100vh;
     display:flex;flex-direction:column}
nav{height:56px;background:var(--navy);display:flex;align-items:center;padding:0 24px}
.wordmark{color:var(--gold);font-size:1.05rem;font-weight:700;text-decoration:none}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}
.card{background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.1);
      padding:40px 44px;width:100%;max-width:440px}
.card-icon{width:52px;height:52px;background:#E0F2EE;border-radius:50%;
           display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.card-icon svg{width:26px;height:26px;stroke:var(--teal);fill:none;stroke-width:2;stroke-linecap:round}
h1{font-size:1.45rem;font-weight:700;text-align:center;margin-bottom:8px}
.subtitle{font-size:.88rem;color:#6A5E50;text-align:center;margin-bottom:28px;line-height:1.6}
label{display:block;font-size:.82rem;font-weight:700;color:#4A3E32;margin-bottom:6px}
.input-wrap{position:relative;margin-bottom:16px}
input[type=password]{width:100%;padding:11px 40px 11px 14px;border:1.5px solid #D5CFC8;
                     border-radius:6px;font-size:.93rem;color:var(--navy);outline:none;
                     transition:.2s;background:#fff}
input[type=password]:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(42,120,104,.12)}
.toggle-pwd{position:absolute;right:12px;top:50%;transform:translateY(-50%);
            background:none;border:none;cursor:pointer;padding:4px;
            color:#999;font-size:.78rem;font-weight:700}
.strength-bar{height:4px;border-radius:2px;margin-top:6px;transition:all .3s;background:#E5E0DA}
.strength-text{font-size:.75rem;color:#888;margin-top:4px;height:16px}
.btn{width:100%;margin-top:8px;padding:12px;background:var(--teal);color:#fff;
     border:none;border-radius:6px;font-size:.95rem;font-weight:700;cursor:pointer;transition:.2s}
.btn:hover{background:#1f5e4e}
.btn:disabled{opacity:.5;cursor:not-allowed}
.alert{border-radius:6px;padding:13px 16px;margin:12px 0;font-size:.87rem;line-height:1.5;display:none}
.alert-success{background:#E0F2EE;border:1px solid #8BCABB;color:#0e4a3a}
.alert-error  {background:#FEE2E2;border:1px solid #FCA5A5;color:#7F1D1D}
.invalid-token{text-align:center;display:none}
.invalid-token p{color:#7F1D1D;margin-bottom:16px;font-size:.93rem}
.invalid-token a{color:var(--teal);font-weight:700}
</style>
</head>
<body>
<nav>
  <a href="ka_home.html" class="wordmark">Knowledge Atlas</a>
</nav>
<main>
  <div class="card">
    <div class="card-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h1>Set a new password</h1>
    <p class="subtitle">Choose a password that is at least 8 characters long.</p>

    <div class="alert alert-error"   id="msg-error"></div>
    <div class="alert alert-success" id="msg-success"></div>

    <div class="invalid-token" id="invalid-token">
      <p>This reset link is invalid or has already been used.</p>
      <a href="ka_forgot_password.html">Request a new reset link →</a>
    </div>

    <form id="resetForm">
      <div>
        <label for="password">New password</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" required minlength="8">
          <button type="button" class="toggle-pwd" id="togglePwd" aria-label="Show/hide password">SHOW</button>
        </div>
        <div class="strength-bar" id="strengthBar"></div>
        <div class="strength-text" id="strengthText"></div>
      </div>
      <div>
        <label for="confirm">Confirm new password</label>
        <div class="input-wrap">
          <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password" required>
        </div>
      </div>
      <button type="submit" class="btn" id="submitBtn">Update password</button>
    </form>
  </div>
</main>

<script>
const API = window.__KA_CONFIG__?.apiBase || 'http://localhost:8765';

// Extract token from URL
const token = new URLSearchParams(window.location.search).get('token');
if (!token) {
  document.getElementById('resetForm').style.display = 'none';
  document.querySelector('.subtitle').style.display = 'none';
  document.getElementById('invalid-token').style.display = 'block';
}

// Show/hide password
document.getElementById('togglePwd').addEventListener('click', function() {
  const inp = document.getElementById('password');
  const vis = inp.type === 'password';
  inp.type = vis ? 'text' : 'password';
  this.textContent = vis ? 'HIDE' : 'SHOW';
});

// Strength meter
document.getElementById('password').addEventListener('input', function() {
  const v = this.value;
  const bar = document.getElementById('strengthBar');
  const txt = document.getElementById('strengthText');
  let score = 0;
  if (v.length >= 8)  score++;
  if (v.length >= 12) score++;
  if (/[A-Z]/.test(v) && /[a-z]/.test(v)) score++;
  if (/\d/.test(v))   score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;
  const labels = ['','Weak','Fair','Good','Strong','Very strong'];
  const colors = ['','#DC2626','#F97316','#FBBF24','#16A34A','#15803D'];
  bar.style.background = score ? colors[score] : '#E5E0DA';
  bar.style.width = score ? `${score*20}%` : '100%';
  txt.textContent = score ? labels[score] : '';
  txt.style.color = colors[score] || '#888';
});

document.getElementById('resetForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const pw  = document.getElementById('password').value;
  const cf  = document.getElementById('confirm').value;
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('msg-error');
  const ok  = document.getElementById('msg-success');

  err.style.display = 'none'; ok.style.display = 'none';

  if (pw !== cf) {
    err.textContent = 'Passwords do not match.';
    err.style.display = 'block';
    return;
  }
  if (pw.length < 8) {
    err.textContent = 'Password must be at least 8 characters.';
    err.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Updating…';

  try {
    const res = await fetch(`${API}/auth/reset-password`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({token, new_password: pw})
    });
    const data = await res.json();
    if (!res.ok) {
      err.textContent = data.detail || 'Something went wrong.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Update password';
    } else {
      ok.textContent = data.message + ' Redirecting to login…';
      ok.style.display = 'block';
      document.getElementById('resetForm').style.display = 'none';
      setTimeout(() => { window.location.href = 'ka_login.html'; }, 2500);
    }
  } catch(ex) {
    err.textContent = 'Could not reach the auth server. Is ka_auth_server.py running?';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Update password';
  }
});
</script>
</body>
</html>
