# ── Normalised schema every adapter must emit ──
# Each adapter returns a dict matching this shape, written as
# harvest/{service_id}/normalised.json in the student's T2.d.2/ dir.
#
#   {
#     "service_id": "elicit",
#     "query": "<the structured query>",
#     "harvested_at": "<ISO timestamp>",
#     "synthesis": "<the service's written answer, if any>",
#     "papers": [
#       {
#         "doi": "10.xxxx/...",
#         "title": "...",
#         "authors": [...],
#         "year": 2023,
#         "abstract": "...",
#         "service_claimed_relevance": 0.93,    # 0-1 if numeric
#         "service_claimed_verdict": "supports",  # or null, or "contradicts", etc.
#         "service_evidence_snippet": "...",      # the service's quoted evidence
#         "source_url": "https://..."
#       },
#       ...
#     ],
#     "raw_response_path": "harvest/{service_id}/raw.json"
#   }
