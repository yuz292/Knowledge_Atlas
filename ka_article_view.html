<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Article — Knowledge Atlas</title>
<script src="ka_canonical_navbar.js" defer></script>
<script src="ka_user_type.js" defer></script>
<script src="ka_data_adapter.js"></script>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#F7F4EF;color:#2C2C2C;line-height:1.6}
  a{color:#2A7868}
  .page-shell{max-width:1260px;margin:0 auto;padding:26px 24px 48px}
  .art-breadcrumb{font-size:.84rem;color:#6B6B6B;margin-bottom:14px}
  .art-breadcrumb a{text-decoration:none}
  .art-breadcrumb a:hover{text-decoration:underline}
  .hero{background:linear-gradient(135deg,#1C3D3A 0%,#214844 100%);color:#fff;border-radius:20px;padding:30px 32px 28px;margin-bottom:22px}
  .hero-top{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:12px}
  .pill{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;font-size:.74rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
  .pill.type{background:rgba(255,255,255,.14);color:#fff}
  .pill.topic{background:rgba(245,166,35,.18);color:#FFD49A}
  .pill-link{text-decoration:none}
  .pill-link:hover{box-shadow:0 4px 12px rgba(0,0,0,.14);transform:translateY(-1px)}
  .hero h1{font-family:Georgia,serif;font-size:2.15rem;line-height:1.15;margin-bottom:10px;max-width:980px}
  .hero .authors{font-size:1rem;color:#E5EEEA;margin-bottom:3px}
  .hero .venue{font-size:.92rem;color:#BFD3CD}
  .hero .doi a{color:#FFD49A}
  .metric-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:18px}
  .metric{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:12px 14px}
  .metric .label{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:#BDD1CB;font-weight:700;margin-bottom:4px}
  .metric .value{font-size:1.15rem;font-weight:700;color:#fff}
  .metric .sub{font-size:.82rem;color:#D6E5E0;margin-top:2px}

  .content-layout{display:grid;grid-template-columns:240px minmax(0,1fr);gap:24px;align-items:start}
  .toc{position:sticky;top:76px;background:#fff;border:1px solid #E0D8CC;border-radius:14px;padding:16px}
  .toc .label{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:#8A9A96;font-weight:700;margin-bottom:10px}
  .toc a{display:block;padding:7px 8px;border-left:2px solid transparent;color:#37514C;text-decoration:none;font-size:.88rem}
  .toc a:hover{background:#F7F4EF}
  .toc a.active{border-left-color:#E8872A;color:#1C3D3A;font-weight:700}

  .main-col{min-width:0}
  .section{background:#fff;border:1px solid #E0D8CC;border-radius:16px;padding:20px 22px;margin-bottom:18px;scroll-margin-top:90px}
  .section h2{font-family:Georgia,serif;font-size:1.28rem;color:#1C3D3A;margin-bottom:10px}
  .section p{margin-bottom:10px}
  .section p:last-child{margin-bottom:0}
  .section-note{font-size:.88rem;color:#6B6B6B}
  .abstract{background:#F7FBF9;border-left:4px solid #2A7868;padding:14px 16px;border-radius:0 10px 10px 0}
  .subhead{font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:#8A9A96;font-weight:700;margin-bottom:8px}

  .chip-row{display:flex;flex-wrap:wrap;gap:8px}
  .chip,.chip-link{display:inline-flex;align-items:center;padding:5px 10px;border:1px solid #E0D8CC;border-radius:999px;background:#F9F5EE;color:#1C3D3A;font-size:.8rem}
  .chip-link{text-decoration:none}
  .chip-link:hover{border-color:#2A7868;color:#2A7868;background:#F3FAF8}

  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
  .stat-card{background:#F8F6F1;border:1px solid #E0D8CC;border-radius:12px;padding:14px 15px}
  .stat-card .label{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:#8A9A96;font-weight:700;margin-bottom:4px}
  .stat-card .value{font-size:1.18rem;font-weight:700;color:#1C3D3A}
  .stat-card .sub{font-size:.84rem;color:#6B6B6B;margin-top:3px}

  .list{display:grid;gap:10px}
  .list-row{padding:12px 14px;border:1px solid #E0D8CC;border-radius:12px;background:#FAF8F3}
  .list-row h3{font-size:1rem;color:#1C3D3A;margin-bottom:4px}
  .list-row .meta{font-size:.84rem;color:#6B6B6B;margin-bottom:4px}
  .list-row .body{font-size:.92rem;color:#2C2C2C}
  .list-row .counts{font-size:.8rem;color:#8A9A96}

  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .soft-box{background:#F8F6F1;border:1px solid #E0D8CC;border-radius:12px;padding:14px 15px}
  .soft-box h3{font-size:.98rem;color:#1C3D3A;margin-bottom:6px}
  .soft-box p{font-size:.9rem}
  .meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
  .meta-box{background:#F8F6F1;border:1px solid #E0D8CC;border-radius:12px;padding:14px 15px}
  .meta-box .label{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:#8A9A96;font-weight:700;margin-bottom:5px}
  .meta-box .value{font-size:.96rem;color:#1C3D3A}
  .gallery-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
  .gallery-card{background:#F8F6F1;border:1px solid #E0D8CC;border-radius:12px;overflow:hidden}
  .gallery-card img{display:block;width:100%;height:156px;object-fit:cover;background:#EEE7DA}
  .gallery-copy{padding:12px 13px}
  .gallery-copy h3{font-size:.98rem;color:#1C3D3A;margin-bottom:5px}
  .gallery-copy p{font-size:.88rem;color:#5E5B54;margin-bottom:8px}
  .gallery-copy .meta{font-size:.78rem;color:#8A9A96}
  .result-surface{display:grid;grid-template-columns:minmax(0,230px) minmax(0,1fr);gap:16px;background:#F8F6F1;border:1px solid #E0D8CC;border-radius:12px;padding:15px;margin-bottom:16px}
  .result-surface img{display:block;width:100%;height:170px;object-fit:cover;border-radius:10px;background:#EEE7DA}
  .result-surface h3{font-size:1rem;color:#1C3D3A;margin-bottom:6px}
  .result-surface p{font-size:.9rem;margin-bottom:8px}
  .journey-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
  .journey-card{display:block;background:#F8F6F1;border:1px solid #E0D8CC;border-radius:12px;padding:15px 16px;text-decoration:none;color:#2C2C2C}
  .journey-card:hover{border-color:#2A7868;box-shadow:0 8px 22px rgba(28,61,58,.08);transform:translateY(-1px)}
  .journey-card .eyebrow{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:#8A9A96;font-weight:700;margin-bottom:7px}
  .journey-card h3{font-size:1rem;color:#1C3D3A;margin-bottom:6px}
  .journey-card p{font-size:.9rem;color:#40514D;margin:0 0 9px}
  .journey-card .meta{font-size:.8rem;color:#6B6B6B}

  details.more{margin-top:12px;border-top:1px dashed #E0D8CC;padding-top:12px}
  details.more summary{cursor:pointer;color:#2A7868;font-weight:700}
  details.more .more-body{margin-top:12px}

  .empty-state{background:#fff;border:1.5px solid #F5D09F;border-radius:16px;padding:24px 28px}
  .empty-state h2{font-family:Georgia,serif;color:#9A5010;margin-bottom:8px}
  .empty-state p{color:#6B6B6B}
  .loading{text-align:center;color:#8A9A96;padding:70px 20px}

  .page-footer{background:#1C3D3A;color:#D6E6E0;padding:18px 24px;font-size:.84rem}
  .page-footer-inner{max-width:1260px;margin:0 auto;display:flex;justify-content:space-between;gap:18px;flex-wrap:wrap}
  .page-footer a{color:#F5A623;text-decoration:none;font-weight:600}
  .page-footer a:hover{text-decoration:underline}

  @media (max-width:980px){
    .content-layout{grid-template-columns:1fr}
    .toc{position:static}
    .two-col{grid-template-columns:1fr}
    .result-surface{grid-template-columns:1fr}
  }
  @media (max-width:720px){
    .page-shell{padding:20px 16px 32px}
    .hero{padding:24px 22px}
    .hero h1{font-size:1.72rem}
  }
</style>
</head>
<body data-ka-regime="global" data-ka-active="articles">
<div id="ka-navbar-slot"></div>

<main class="page-shell">
  <div class="art-breadcrumb">
    <a href="ka_home.html">Home</a> ›
    <a href="ka_articles.html">Articles</a> ›
    <span id="crumb-title">Article</span>
  </div>
  <div id="art-mount" class="loading">Loading article record…</div>
</main>

<footer class="page-footer">
  <div class="page-footer-inner">
    <div>Article pages now read from the Atlas payloads plus the exported V7 detail surface, so the science summary, operationalization, and PNU sections come from the current extraction lineage rather than from a thin article stub.</div>
    <div><a href="ka_home.html">Home</a> · <a href="ka_topics.html">Topics</a> · <a href="ka_articles.html">Articles</a></div>
  </div>
</footer>

<script>
const esc = value => String(value == null ? '' : value).replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;', "'":'&#39;'}[c])
);

const compact = (text, limit = 260) => {
  const value = String(text || '').replace(/\s+/g, ' ').trim();
  if (!value) return '';
  return value.length <= limit ? value : value.slice(0, limit - 1).trimEnd() + '…';
};

function paragraphize(text) {
  return String(text || '')
    .split(/\n{2,}/)
    .map(chunk => chunk.trim())
    .filter(Boolean)
    .map(chunk => `<p>${esc(chunk)}</p>`)
    .join('');
}

function metricCard(label, value, sub) {
  return `<div class="stat-card"><div class="label">${esc(label)}</div><div class="value">${esc(value)}</div>${sub ? `<div class="sub">${esc(sub)}</div>` : ''}</div>`;
}

function lowerKey(value) {
  return String(value || '').replace(/\s+/g, ' ').trim().toLowerCase();
}

function topicHref(label) {
  return `ka_topic_facet_view.html?topic=${encodeURIComponent(String(label || '').trim())}`;
}

function theoryHref(label, theoryByName) {
  const raw = String(label || '').trim();
  if (!raw) return '';
  const hit = theoryByName.get(lowerKey(raw));
  if (hit && hit.id) return `ka_home_theory.html?theory=${encodeURIComponent(hit.id)}`;
  return '';
}

function renderChipCollection(items, emptyText) {
  if (!items || !items.length) {
    return `<p class="section-note">${esc(emptyText)}</p>`;
  }
  return `<div class="chip-row">${items.map(item => `<span class="chip">${esc(item)}</span>`).join('')}</div>`;
}

function renderLinkedChipCollection(items, emptyText, hrefFor, extraClass = '') {
  if (!items || !items.length) {
    return `<p class="section-note">${esc(emptyText)}</p>`;
  }
  return `<div class="chip-row">${items.map(item => {
    const href = hrefFor(item);
    if (!href) return `<span class="chip">${esc(item)}</span>`;
    const cls = ['chip-link', extraClass].filter(Boolean).join(' ');
    return `<a class="${cls}" data-runtime-link="${esc(href)}">${esc(item)}</a>`;
  }).join('')}</div>`;
}

function hydrateRuntimeLinks(root) {
  (root || document).querySelectorAll('[data-runtime-link]').forEach(node => {
    node.setAttribute('href', node.getAttribute('data-runtime-link'));
  });
}

function renderPaperRefs(rows, emptyText) {
  if (!rows || !rows.length) {
    return `<p class="section-note">${esc(emptyText)}</p>`;
  }
  return `<div class="list">${rows.map(row => `
    <div class="list-row">
      <h3><a href="ka_article_view.html?id=${encodeURIComponent(row.paper_id)}">${esc(row.title || row.paper_id)}</a></h3>
      <div class="meta">${esc(row.primary_topic || 'Topic pending')} ${row.year ? '· ' + esc(row.year) : ''}</div>
      <div class="counts">${esc(String(row.link_count || 0))} explicit link${(row.link_count || 0) === 1 ? '' : 's'} in the current argumentation layer</div>
    </div>
  `).join('')}</div>`;
}

function renderClaimRows(rows) {
  if (!rows || !rows.length) {
    return '<p class="section-note">No claim-level evidence rows were available for this article.</p>';
  }
  return `<div class="list">${rows.map(row => `
    <div class="list-row">
      <div class="meta">${esc(row.signal || 'Claim')} · ${esc(row.warrant || 'Warrant pending')} · credence ${row.credence == null ? '—' : esc(Number(row.credence).toFixed(2))}</div>
      <div class="body">${esc(row.finding || '')}</div>
      <div class="counts">${esc(String(row.support_count || 0))} supports · ${esc(String(row.attack_count || 0))} attacks · ${esc(row.qualifier || 'status pending')}</div>
    </div>
  `).join('')}</div>`;
}

function renderMeasureRows(items, key) {
  if (!items || !items.length) return '<p class="section-note">No entries surfaced yet.</p>';
  return `<div class="list">${items.slice(0, 10).map(item => `
    <div class="list-row">
      <h3>${esc(item[key] || item.name || 'Unnamed')}</h3>
      <div class="meta">${esc(item.instrument_type || item.type || item.target_construct || 'Unclassified')}</div>
      <div class="counts">${Array.isArray(item.page_refs) && item.page_refs.length ? 'pages ' + esc(item.page_refs.join(', ')) : 'page refs pending'}</div>
    </div>
  `).join('')}</div>`;
}

function renderMetaBox(label, value) {
  return `
    <div class="meta-box">
      <div class="label">${esc(label)}</div>
      <div class="value">${esc(value || 'Pending')}</div>
    </div>
  `;
}

function renderVisualGallery(items) {
  if (!items || !items.length) {
    return '<p class="section-note">No visual support surfaces were exported for this paper yet.</p>';
  }
  return `<div class="gallery-grid">${items.slice(0, 8).map(item => `
    <div class="gallery-card">
      ${item.image_url ? '<img src="' + esc(item.image_url) + '" alt="' + esc(item.atlas_title || 'Visual support surface') + '" loading="lazy">' : ''}
      <div class="gallery-copy">
        <h3>${esc(item.atlas_title || 'Visual support surface')}</h3>
        <p>${esc(compact(item.atlas_caption || '', 220) || 'Recovered visual support surface.')}</p>
        <div class="meta">${esc(item.surface_kind || 'surface')} · page ${esc(item.page || '—')}</div>
      </div>
    </div>
  `).join('')}</div>`;
}

function renderTechnicalSurface(item) {
  if (!item || typeof item !== 'object' || Array.isArray(item)) {
    return '<p class="section-note">No technical result surface was exported for this paper yet.</p>';
  }
  return `
    <div class="result-surface">
      ${item.image_url ? '<img src="' + esc(item.image_url) + '" alt="' + esc(item.title || 'Technical results surface') + '" loading="lazy">' : ''}
      <div>
        <h3>${esc(item.title || 'Technical results surface')}</h3>
        ${item.summary ? `<p>${esc(item.summary)}</p>` : ''}
        ${item.caption ? `<p class="section-note">${esc(item.caption)}</p>` : ''}
        <div class="meta">Page ${esc(item.page || '—')}</div>
      </div>
    </div>
  `;
}

function updateTocActive() {
  const links = Array.from(document.querySelectorAll('.toc a[href^="#"]'));
  const sections = links.map(link => document.getElementById(link.getAttribute('href').slice(1))).filter(Boolean);
  const y = window.scrollY + 120;
  let active = sections[0] && sections[0].id;
  sections.forEach(section => {
    if (section.offsetTop <= y) active = section.id;
  });
  links.forEach(link => link.classList.toggle('active', link.getAttribute('href') === '#' + active));
}

(async function(){
  const mount = document.getElementById('art-mount');
  const crumb = document.getElementById('crumb-title');
  const params = new URLSearchParams(window.location.search);
  const paperId = params.get('id') || params.get('paper_id') || '';

  if (!paperId) {
    mount.className = 'empty-state';
    mount.innerHTML = `
      <h2>No article id was provided</h2>
      <p>This page expects a paper id such as <code>PDF-0007</code>. Open it from the article or topic listings so the Atlas can load the correct record.</p>
    `;
    crumb.textContent = 'No article loaded';
    return;
  }

  let articlesPayload = {};
  let detailsPayload = {};
  let theoriesPayload = { theories: [] };
  try {
    if (window.KA_DATA_ADAPTER) {
      [articlesPayload, detailsPayload, theoriesPayload] = await Promise.all([
        window.KA_DATA_ADAPTER.loadPayload('articles', { articles: [] }),
        window.KA_DATA_ADAPTER.loadPayload('article_details', { details: {} }),
        window.KA_DATA_ADAPTER.loadPayload('theories', { theories: [] }),
      ]);
    } else {
      const [articlesRes, detailsRes, theoryRes] = await Promise.all([
        fetch('data/ka_payloads/articles.json', { cache: 'no-store' }),
        fetch('data/ka_payloads/article_details.json', { cache: 'no-store' }),
        fetch('data/ka_payloads/theories.json', { cache: 'no-store' }),
      ]);
      if (!articlesRes.ok) throw new Error('articles payload HTTP ' + articlesRes.status);
      if (!detailsRes.ok) throw new Error('article detail payload HTTP ' + detailsRes.status);
      if (!theoryRes.ok) throw new Error('theories payload HTTP ' + theoryRes.status);
      articlesPayload = await articlesRes.json();
      detailsPayload = await detailsRes.json();
      theoriesPayload = await theoryRes.json();
    }
  } catch (error) {
    mount.className = 'empty-state';
    mount.innerHTML = `
      <h2>Could not load the article payloads</h2>
      <p>This page needs <code>articles.json</code> and <code>article_details.json</code> to render the richer Atlas view. Error: <code>${esc(error.message || error)}</code></p>
    `;
    crumb.textContent = paperId;
    return;
  }

  const article = ((articlesPayload && articlesPayload.articles) || []).find(row => row && row.paper_id === paperId);
  const detail = ((detailsPayload && detailsPayload.details) || {})[paperId] || {};
  if (!article) {
    mount.className = 'empty-state';
    mount.innerHTML = `
      <h2>Article ${esc(paperId)} is not in the current payload</h2>
      <p>The canonical article payload does not currently include this paper id. It may appear after the next payload rebuild.</p>
    `;
    crumb.textContent = paperId;
    return;
  }

  const science = detail.science_summary || {};
  const pnu = detail.pnu || {};
  const operationalization = detail.operationalization || {};
  const evidenceProfile = detail.evidence_profile || {};
  const atlasReading = detail.atlas_reading || {};
  const articleMeta = detail.article_meta || {};
  const detailArgumentation = detail.argumentation || {};
  const detailTheories = (detail.theories && detail.theories.length ? detail.theories : article.theories) || [];
  const detailRelatedPapers = (detail.related_papers && detail.related_papers.length ? detail.related_papers : article.related_papers) || [];
  const constructLabels = detail.constructs || [];
  const instrumentTags = detail.instruments || [];
  const visualGallery = detail.visual_support_gallery || [];
  const technicalSurface = (detail.technical_results_table && typeof detail.technical_results_table === 'object' && !Array.isArray(detail.technical_results_table))
    ? detail.technical_results_table
    : null;
  const topClaims = detail.top_claims || [];
  const supportingPapers = detail.supporting_papers || [];
  const contradictingPapers = detail.contradicting_papers || [];
  const authors = Array.isArray(articleMeta.authors) && articleMeta.authors.length
    ? articleMeta.authors.join(', ')
    : (Array.isArray(article.authors) ? article.authors.join(', ') : '');
  const typeLabel = String(article.article_type || '').replace(/_/g, ' ').trim();
  const topicLabels = article.topic_labels || [];
  const articleArgumentation = article.argumentation_summary || {};
  const theoryRows = (theoriesPayload && theoriesPayload.theories) || [];
  const theoryByName = new Map(theoryRows.map(row => [lowerKey(row.name || row.id), row]));
  const firstTheoryLabel = detailTheories.find(Boolean) || '';
  const firstTheoryRow = theoryByName.get(lowerKey(firstTheoryLabel)) || null;
  const firstTheoryLink = firstTheoryLabel ? theoryHref(firstTheoryLabel, theoryByName) : '';
  const primaryTopicLink = article.primary_topic ? topicHref(article.primary_topic) : '';
  const firstTopicLink = topicLabels.length ? topicHref(topicLabels[0]) : primaryTopicLink;
  const mechanismLink = firstTheoryRow && firstTheoryRow.id
    ? `ka_journey_mechanism.html?theory=${encodeURIComponent(firstTheoryRow.id)}`
    : 'ka_journey_mechanism.html';

  document.title = `${article.title || paperId} — Knowledge Atlas`;
  crumb.textContent = article.title || paperId;

  mount.className = '';
  mount.innerHTML = `
    <section class="hero">
      <div class="hero-top">
        ${typeLabel ? `<span class="pill type">${esc(typeLabel)}</span>` : ''}
        ${article.primary_topic ? `<a class="pill topic pill-link article-primary-topic-link" data-runtime-link="${esc(primaryTopicLink)}">${esc(article.primary_topic)}</a>` : ''}
      </div>
      <h1>${esc(article.title || paperId)}</h1>
      ${authors ? `<div class="authors">${esc(authors)}</div>` : ''}
      <div class="venue">
        ${article.venue ? esc(article.venue) + ' · ' : ''}
        ${article.year ? esc(article.year) + ' · ' : ''}
        ${article.doi ? `<span class="doi"><a href="https://doi.org/${encodeURIComponent(article.doi)}" target="_blank" rel="noopener">${esc(article.doi)}</a></span>` : 'DOI pending'}
      </div>
      <div class="metric-row">
        <div class="metric">
          <div class="label">Atlas credence</div>
          <div class="value">${evidenceProfile.atlas_credence_mean == null ? '—' : esc(Number(evidenceProfile.atlas_credence_mean).toFixed(2))}</div>
          <div class="sub">${evidenceProfile.atlas_credence_percentile == null ? 'percentile pending' : esc(evidenceProfile.atlas_credence_percentile + 'th percentile across indexed papers')}</div>
        </div>
        <div class="metric">
        <div class="label">Claim network</div>
          <div class="value">${esc(String(evidenceProfile.paper_claim_count || article.claim_count || 0))}</div>
          <div class="sub">${esc(String(evidenceProfile.support_edge_count || detailArgumentation.support_edge_count || articleArgumentation.incoming_support_total || 0))} support edges · ${esc(String(evidenceProfile.attack_edge_count || detailArgumentation.attack_edge_count || articleArgumentation.incoming_attack_total || 0))} attack edges</div>
        </div>
        <div class="metric">
          <div class="label">Measures</div>
          <div class="value">${esc(String(operationalization.measurement_count || 0))}</div>
          <div class="sub">${esc(String(operationalization.instrument_count || 0))} instruments · ${esc(String(operationalization.sensor_count || 0))} sensors</div>
        </div>
        <div class="metric">
        <div class="label">Verification</div>
          <div class="value">${science.passed_verification ? 'pass' : 'pending'}</div>
          <div class="sub">${esc(science.page_image_policy || 'policy pending')} · ${esc(pnu.verifier_status || 'PNU pending')}</div>
        </div>
      </div>
    </section>

    <div class="content-layout">
      <aside class="toc">
        <div class="label">On this page</div>
        <a href="#abstract" class="active">Abstract</a>
        <a href="#study-record">Study record</a>
        <a href="#atlas-reading">Atlas reading</a>
        <a href="#evidence">Evidence profile</a>
        <a href="#journey">Atlas journey</a>
        <a href="#measures">Measures & sensors</a>
        <a href="#visuals">Visual evidence</a>
        <a href="#pnu">Relevant PNUs</a>
        <a href="#claims">Key claims</a>
        <a href="#support">Support & contradiction</a>
        <a href="#related">Related papers</a>
        <a href="#provenance">Provenance</a>
      </aside>

      <div class="main-col">
        <section class="section" id="abstract">
          <h2>Abstract</h2>
          ${article.abstract ? `<div class="abstract">${paragraphize(article.abstract)}</div>` : '<p class="section-note">No abstract is available in the current payload.</p>'}
        </section>

        <section class="section" id="study-record">
          <div class="subhead">Study record</div>
          <h2>Paper at a glance</h2>
          <div class="meta-grid">
            ${renderMetaBox('Primary topic', articleMeta.primary_topic || article.primary_topic || 'Pending')}
            ${renderMetaBox('Sample size', articleMeta.sample_n == null ? 'Not reported' : articleMeta.sample_n)}
            ${renderMetaBox('Dominant stance', detailArgumentation.dominant_stance || 'Pending')}
            ${renderMetaBox('APA citation', articleMeta.apa_citation || 'Pending')}
          </div>
          <div class="two-col" style="margin-top:16px">
            <div class="soft-box">
              <h3>Main conclusion</h3>
              ${articleMeta.main_conclusion ? paragraphize(articleMeta.main_conclusion) : '<p class="section-note">No main-conclusion summary was exported.</p>'}
            </div>
            <div class="soft-box">
              <h3>Argumentation snapshot</h3>
              <p><b>${esc(String(detailArgumentation.claim_count || topClaims.length || 0))}</b> claims, <b>${esc(String(detailArgumentation.support_edge_count || 0))}</b> supports, <b>${esc(String(detailArgumentation.attack_edge_count || 0))}</b> attacks, <b>${esc(String(detailArgumentation.contradiction_count || 0))}</b> contradictions.</p>
              <p class="section-note">${detailArgumentation.node_qualifier ? esc(detailArgumentation.node_qualifier) : 'The current export does not attach a longer node qualifier for this paper.'}</p>
            </div>
          </div>
        </section>

        <section class="section" id="atlas-reading">
          <div class="subhead">Science summary</div>
          <h2>Atlas reading</h2>
          ${science.core_finding ? paragraphize(science.core_finding) : '<p class="section-note">The science summary has not yet been exported for this paper.</p>'}
          <div class="two-col" style="margin-top:14px">
            <div class="soft-box">
              <h3>Methods and design</h3>
              ${science.methods_and_design ? paragraphize(compact(science.methods_and_design, 900)) : '<p class="section-note">Methods summary pending.</p>'}
            </div>
            <div class="soft-box">
              <h3>Atlas interpretation</h3>
              ${atlasReading.core_finding_text ? paragraphize(atlasReading.core_finding_text) : '<p class="section-note">No additional Atlas interpretation row was available.</p>'}
            </div>
          </div>
          ${science.design_implications || science.limitations || science.gap_and_door ? `
            <details class="more">
              <summary>Open the longer Atlas summary</summary>
              <div class="more-body">
                ${science.key_statistics ? `<div class="soft-box" style="margin-bottom:10px"><h3>Key statistics</h3>${paragraphize(science.key_statistics)}</div>` : ''}
                ${science.design_implications ? `<div class="soft-box" style="margin-bottom:10px"><h3>Design implications</h3>${paragraphize(science.design_implications)}</div>` : ''}
                ${science.limitations ? `<div class="soft-box" style="margin-bottom:10px"><h3>Limitations and uncertainty</h3>${paragraphize(science.limitations)}</div>` : ''}
                ${science.gap_and_door ? `<div class="soft-box"><h3>The gap and the door</h3>${paragraphize(science.gap_and_door)}</div>` : ''}
              </div>
            </details>` : ''}
        </section>

        <section class="section" id="evidence">
          <h2>Evidence profile</h2>
          <div class="stats-grid">
            ${metricCard('Atlas credence', evidenceProfile.atlas_credence_mean == null ? '—' : Number(evidenceProfile.atlas_credence_mean).toFixed(2), evidenceProfile.atlas_credence_percentile == null ? 'Percentile pending' : evidenceProfile.atlas_credence_percentile + 'th percentile')}
            ${metricCard('Claim count', evidenceProfile.paper_claim_count || article.claim_count || 0, 'paper-level extracted claims')}
            ${metricCard('Support edges', evidenceProfile.support_edge_count || detailArgumentation.support_edge_count || articleArgumentation.incoming_support_total || 0, 'current argumentation layer')}
            ${metricCard('Attack edges', evidenceProfile.attack_edge_count || detailArgumentation.attack_edge_count || articleArgumentation.incoming_attack_total || 0, 'explicit challenge edges')}
            ${metricCard('Contradictions', evidenceProfile.contradiction_count || detailArgumentation.contradiction_count || articleArgumentation.contested_claim_count || 0, 'cross-paper or intra-paper contestation')}
            ${metricCard('Search targets', evidenceProfile.search_target_count || detailArgumentation.search_target_count || articleArgumentation.search_target_count || 0, 'open resolution prompts')}
          </div>
          <p class="section-note" style="margin-top:12px">Until a separate paper-level EN credence is published, this page uses the mean credence of the paper's extracted evidence rows as the best current paper-level credence reading.</p>
          ${(topicLabels && topicLabels.length) || detailTheories.length || constructLabels.length || instrumentTags.length ? `
            <div class="two-col" style="margin-top:16px">
              <div class="soft-box">
                <h3>Topics</h3>
                ${renderLinkedChipCollection(topicLabels, 'No topics yet.', label => topicHref(label), 'article-topic-link')}
              </div>
              <div class="soft-box">
                <h3>Theories and fronts</h3>
                ${renderLinkedChipCollection(detailTheories, 'No theory links have been normalized for this paper yet.', label => theoryHref(label, theoryByName), 'article-theory-link')}
              </div>
            </div>
            <div class="two-col" style="margin-top:16px">
              <div class="soft-box">
                <h3>Constructs</h3>
                ${renderChipCollection(constructLabels, 'No constructs have been exported yet.')}
              </div>
              <div class="soft-box">
                <h3>Named instruments</h3>
                ${renderChipCollection(instrumentTags, 'No named instruments have been exported yet.')}
              </div>
            </div>` : ''}
        </section>

        <section class="section" id="journey">
          <div class="subhead">Cross-page navigation</div>
          <h2>Continue the Atlas journey</h2>
          <p class="section-note" style="margin-bottom:14px">A single paper is usually too small a unit to understand the real structure of the evidence. These links move from this paper into its topic bundle, its theory neighbourhood, and the mechanism layer.</p>
          <div class="journey-grid">
            <a class="journey-card journey-link-topic" data-runtime-link="${esc(firstTopicLink || 'ka_topic_facet_view.html')}">
              <div class="eyebrow">Topic surface</div>
              <h3>${esc(article.primary_topic || topicLabels[0] || 'Open the topic crosswalk')}</h3>
              <p>See the defended bundle, its architectural family, and the topic-level theory signals that this paper now sits inside.</p>
              <div class="meta">${esc(topicLabels.length || 0)} exported topic link${topicLabels.length === 1 ? '' : 's'} from this paper.</div>
            </a>
            <a class="journey-card journey-link-theory" data-runtime-link="${esc(firstTheoryLink || 'ka_home_theory.html')}">
              <div class="eyebrow">Theory surface</div>
              <h3>${esc(firstTheoryLabel || 'Open the live theory index')}</h3>
              <p>Move from this paper to the current theory record, its neighbouring theories, and the representative paper set carrying it.</p>
              <div class="meta">${esc(detailTheories.length || 0)} normalized theory link${detailTheories.length === 1 ? '' : 's'} on this paper.</div>
            </a>
            <a class="journey-card journey-link-mechanism" data-runtime-link="${esc(mechanismLink)}">
              <div class="eyebrow">Mechanism surface</div>
              <h3>Open the mechanism layer</h3>
              <p>Carry the paper's theory context into the mechanism inventory and the theories under the greatest argumentative pressure.</p>
              <div class="meta">${esc(firstTheoryLabel || 'Generic mechanism inventory')} ${firstTheoryLabel ? 'focus' : 'overview'}.</div>
            </a>
          </div>
        </section>

        <section class="section" id="measures">
          <h2>Measures, instruments, and sensors</h2>
          <div class="stats-grid" style="margin-bottom:14px">
            ${metricCard('Measures', operationalization.measurement_count || 0, 'explicit outcome measures')}
            ${metricCard('Instruments', operationalization.instrument_count || 0, 'scales, tests, or protocols')}
            ${metricCard('Sensors', operationalization.sensor_count || 0, 'physiological or environmental sensors')}
            ${metricCard('Operationalizations', operationalization.outcome_operationalization_count || 0, 'outcome mappings')}
          </div>
          <div class="two-col">
            <div class="soft-box">
              <h3>Instruments</h3>
              ${renderMeasureRows(operationalization.instrument_inventory, 'name')}
            </div>
            <div class="soft-box">
              <h3>Sensors</h3>
              ${renderMeasureRows(operationalization.sensor_inventory, 'name')}
            </div>
          </div>
          <div class="soft-box" style="margin-top:16px">
            <h3>Named measures</h3>
            ${renderMeasureRows(operationalization.measurement_inventory, 'measure_name')}
          </div>
        </section>

        <section class="section" id="visuals">
          <h2>Visual support gallery</h2>
          <p class="section-note">These surfaces come from the current V7-derived visual export. They are useful as evidence of stimuli, context, and results, but they are not a substitute for reading the full paper.</p>
          ${renderTechnicalSurface(technicalSurface)}
          ${renderVisualGallery(visualGallery)}
        </section>

        <section class="section" id="pnu">
          <div class="subhead">Neuroscience reading</div>
          <h2>Relevant PNUs</h2>
          ${pnu.short_summary ? paragraphize(pnu.short_summary) : '<p class="section-note">No exported PNU short summary is available for this paper yet.</p>'}
          <div class="stats-grid" style="margin-top:14px">
            ${metricCard('PNU short form', pnu.short_status || 'pending', '300-word surface')}
            ${metricCard('PNU long form', pnu.long_status || 'pending', 'extended mechanism reading')}
            ${metricCard('Panel grounding', pnu.panel_status || 'pending', (pnu.panel_basis_count || 0) + ' panel sources')}
            ${metricCard('Verifier', pnu.verifier_status || 'pending', 'current lifecycle status')}
          </div>
          ${pnu.long_summary ? `
            <details class="more">
              <summary>Open the longer PNU reading</summary>
              <div class="more-body">${paragraphize(pnu.long_summary)}</div>
            </details>` : ''}
        </section>

        <section class="section" id="claims">
          <h2>Key claims surfaced from the current evidence layer</h2>
          ${renderClaimRows(topClaims)}
        </section>

        <section class="section" id="support">
          <h2>Support and contradiction status</h2>
          <div class="two-col">
            <div class="soft-box">
              <h3>Supporting papers</h3>
              ${renderPaperRefs(supportingPapers, 'No explicit inter-paper support links have yet been surfaced for this paper. The related-paper list below still gives nearby same-front material.')}
            </div>
            <div class="soft-box">
              <h3>Contradicting or challenging papers</h3>
              ${renderPaperRefs(contradictingPapers, 'No explicit contradictory paper has yet been surfaced by the current argumentation layer. That is a statement about the present layer, not a proof that the literature is unchallenged.')}
            </div>
          </div>
        </section>

        <section class="section" id="related">
          <h2>Related papers on the same front or method family</h2>
          ${detailRelatedPapers && detailRelatedPapers.length ? `
            <div class="list">${detailRelatedPapers.map(row => `
              <div class="list-row">
                <h3><a href="ka_article_view.html?id=${encodeURIComponent(row.paper_id)}">${esc(row.title || row.paper_id)}</a></h3>
                <div class="meta">${esc(row.reason || 'related paper')} ${row.primary_front ? '· ' + esc(row.primary_front) : ''}</div>
                <div class="counts">match score ${esc(String(row.score || 0))}</div>
              </div>
            `).join('')}</div>
          ` : '<p class="section-note">No related-paper links were exported for this article.</p>'}
        </section>

        <section class="section" id="provenance">
          <h2>Provenance and audit</h2>
          <div class="two-col">
            <div class="soft-box">
              <h3>Science summary provenance</h3>
              <p>Source modality: <b>${esc(science.summary_source_modality || 'pending')}</b></p>
              <p>Page-image policy: <b>${esc(science.page_image_policy || 'pending')}</b></p>
              <p>Verification: <b>${science.passed_verification ? 'pass' : 'pending'}</b></p>
            </div>
            <div class="soft-box">
              <h3>Field audit snapshot</h3>
              <p>${article.json_status ? esc(Object.entries(article.json_status).slice(0, 8).map(([k, v]) => `${k}=${v}`).join(' · ')) : 'No field-audit snapshot was attached.'}</p>
            </div>
          </div>
          <p class="section-note" style="margin-top:12px">Payload sources: <code>articles.json</code> and <code>article_details.json</code>. The richer detail surface is exported from the V7 lifecycle and accepted-row artifacts during the Knowledge Atlas adapter rebuild, including theory links, related-paper neighborhoods, visual support surfaces, and the current PNU reading.</p>
        </section>
      </div>
    </div>
  `;

  hydrateRuntimeLinks(mount);
  window.addEventListener('scroll', updateTocActive, { passive: true });
  updateTocActive();
})();
</script>
</body>
</html>
