<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Articles — Knowledge Atlas</title>
<meta name="description" content="Search and filter the Knowledge Atlas corpus of cognitive-neuroscience-for-architecture articles by year, title, authors, citation count, or evidentiary status.">
<script src="ka_canonical_navbar.js" defer></script>
<script src="ka_user_type.js" defer></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
     background:#F7F4EF;color:#2C2C2C;line-height:1.55}
main.ka-outer{max-width:1100px;margin:24px auto 80px;padding:0 24px}

.ka-hero{border-bottom:2px solid #E0D8CC;padding-bottom:16px;margin-bottom:20px}
.ka-hero h1{font-family:Georgia,serif;font-size:1.9rem;color:#1C3D3A;margin-bottom:4px}
.ka-hero p{color:#6B6B6B;font-size:.95rem;margin:0}

/* Filter toolbar */
.toolbar{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:10px;
         padding:14px;background:#F9F5EE;border:1px solid #E0D8CC;
         border-radius:10px;margin-bottom:18px;align-items:center}
.toolbar input[type="search"],.toolbar select{padding:8px 10px;
  border:1.5px solid #D8D0C5;border-radius:7px;font:inherit;font-size:.88rem;
  background:#fff;width:100%}
.toolbar input:focus,.toolbar select:focus{outline:none;border-color:#2A7868;
  box-shadow:0 0 0 3px rgba(42,120,104,.15)}
@media (max-width:760px){.toolbar{grid-template-columns:1fr 1fr}}

.count-bar{display:flex;justify-content:space-between;align-items:center;
           font-size:.84rem;color:#6B6B6B;margin-bottom:10px}
.count-bar .count b{color:#1C3D3A;font-weight:700}
.count-bar .sort{display:flex;align-items:center;gap:8px}

/* Article rows */
.results{display:flex;flex-direction:column;gap:10px}
.art{background:#fff;border:1.5px solid #E0D8CC;border-radius:10px;
     padding:14px 18px;transition:all .15s}
.art:hover{border-color:#2A7868;box-shadow:0 4px 12px rgba(0,0,0,.04)}
.art h3{font-family:Georgia,serif;font-size:1.05rem;color:#1C3D3A;
        font-weight:700;margin-bottom:4px;line-height:1.3}
.art h3 a{color:#1C3D3A;text-decoration:none}
.art h3 a:hover{color:#2A7868}
.art .authors{font-size:.86rem;color:#2C2C2C;margin-bottom:4px}
.art .meta{font-size:.78rem;color:#8A9A96;display:flex;gap:12px;flex-wrap:wrap;
           margin-bottom:6px}
.art .meta .citations{color:#E8872A;font-weight:700}
.art .pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{display:inline-block;font-size:.66rem;font-weight:700;
      padding:2px 8px;border-radius:10px;letter-spacing:.04em}
.pill-en-strong{background:#E8F8F2;color:#1A7050}
.pill-en-moderate{background:#FEF3E2;color:#9a5010}
.pill-en-weak{background:#FEE4E4;color:#A02020}
.pill-en-contested{background:#F3E8FE;color:#6B2FA0}
.pill-t1{background:#EBF2F8;color:#1A56A0}

.pagination{display:flex;justify-content:center;gap:6px;margin-top:20px}
.pagination button{padding:6px 12px;border:1px solid #D8D0C5;background:#fff;
                   border-radius:6px;cursor:pointer;font:inherit;font-size:.85rem;color:#2C2C2C}
.pagination button:disabled{color:#8A9A96;cursor:not-allowed}
.pagination button.active{background:#1C3D3A;color:#fff;border-color:#1C3D3A}

.empty{padding:50px 20px;text-align:center;color:#6B6B6B;font-style:italic;
       background:#fff;border:1px dashed #D8D0C5;border-radius:10px}

.footer-cta{background:#F9F5EE;border:1px solid #E0D8CC;border-radius:10px;
            padding:16px 20px;margin-top:22px;font-size:.88rem}
.footer-cta a{color:#2A7868;font-weight:600;text-decoration:none}
</style>
</head>

<body data-ka-regime="global"
      data-ka-active="articles"
      data-ka-crumbs='[["Home","ka_home.html"],["Articles",""]]'>

<div id="ka-navbar-slot"></div>
<div id="ka-breadcrumb-slot"></div>

<main id="ka-main" class="ka-outer">

<div class="ka-hero">
  <h1>Articles</h1>
  <p>Search and filter the corpus. Evidentiary status (EN) reflects the
     Atlas's Quinean coherentist grading. Click any title to open the
     per-article PNU page.</p>
</div>

<!-- Filter toolbar: search + year + citation + EN + sort -->
<div class="toolbar">
  <input type="search" id="search" placeholder="Search by title, author, DOI, or topic…">
  <select id="yearFilter">
    <option value="">Any year</option>
    <option value="2024-2026">2024–2026</option>
    <option value="2020-2023">2020–2023</option>
    <option value="2015-2019">2015–2019</option>
    <option value="2010-2014">2010–2014</option>
    <option value="before-2010">Before 2010</option>
  </select>
  <select id="citationFilter">
    <option value="">Any citations</option>
    <option value="1000+">1,000+</option>
    <option value="100-999">100–999</option>
    <option value="10-99">10–99</option>
    <option value="lt-10">&lt; 10</option>
  </select>
  <select id="enFilter">
    <option value="">Any EN status</option>
    <option value="strong">Strong</option>
    <option value="moderate">Moderate</option>
    <option value="weak">Weak</option>
    <option value="contested">Contested</option>
  </select>
  <select id="sortBy">
    <option value="year-desc">Newest first</option>
    <option value="year-asc">Oldest first</option>
    <option value="citations-desc">Most cited</option>
    <option value="title">Title A–Z</option>
  </select>
</div>

<div class="count-bar">
  <span class="count"><b id="resultCount">—</b> articles</span>
  <span style="font-size:.78rem;color:#8A9A96;">EN = Evidentiary Network status (Atlas grading)</span>
</div>

<div class="results" id="results"></div>

<div class="pagination" id="pagination"></div>

<div class="footer-cta">
  Missing a paper that should be here? <a href="ka_contribute.html">Propose an article →</a>
</div>

</main>

<script>
/* ─────────────────────────────────────────────────────────────
   Articles — minimal, clean, search-and-filter.
   Loads from data/ka_payloads/articles.json in production.
   For this demo, seed a representative sample inline.
   ───────────────────────────────────────────────────────────── */

const SAMPLE_ARTICLES = [
  {id:'PDF-0001', title:'Attention restoration theory: Forty years of research', authors:'Kaplan, R.', year:2020, citations:420, en:'strong',  t1:['PP','SN','DP'], doi:'10.1038/nature...'},
  {id:'PDF-0042', title:'Predictive coding in the visual cortex', authors:'Rao, R. P. N., Ballard, D. H.', year:1999, citations:8200, en:'strong',  t1:['PP'], doi:'10.1038/4580'},
  {id:'PDF-0103', title:'Effects of daylight access on office-worker alertness and sleep quality', authors:'Figueiro, M. G., et al.', year:2017, citations:520, en:'strong',  t1:['CB'], doi:'10.1016/j.slee.2017'},
  {id:'PDF-0147', title:'Ceiling height and construal: A replication attempt', authors:'Meyers-Levy, J., Zhu, R., & Novotny, M.', year:2022, citations:45, en:'contested', t1:['EC','PP'], doi:'10.1037/xge...'},
  {id:'PDF-0199', title:'The locus coeruleus: A new look at the blue spot', authors:'Poe, G. R., et al.', year:2020, citations:520, en:'strong',  t1:['NM','SN'], doi:'10.1038/s41583-020-0360-9'},
  {id:'PDF-0278', title:'Biophilic design and stress recovery in office environments', authors:'Lee, K. E., et al.', year:2015, citations:890, en:'moderate', t1:['NM','IC'], doi:'10.1016/j.jenvp.2014'},
  {id:'PDF-0412', title:'Multisensory integration in architectural perception', authors:'Djebbara, Z., et al.', year:2021, citations:140, en:'moderate', t1:['MS','PP'], doi:'10.1016/j.neubiorev.2021'},
  {id:'PDF-0535', title:'Navigating cognition: Spatial codes for human thinking', authors:'Bellmund, J. L. S., et al.', year:2018, citations:780, en:'strong',  t1:['DP'], doi:'10.1126/science.aat6766'},
  {id:'PDF-0590', title:'Great expectations: Is there evidence for predictive coding in auditory cortex?', authors:'Heilbron, M., Chait, M.', year:2018, citations:390, en:'strong',  t1:['PP'], doi:'10.1016/j.neuroscience.2017.07.061'},
  {id:'PDF-0676', title:'Warmth priming and prosocial behaviour: A multi-lab replication', authors:'Chabris, C. F., et al.', year:2019, citations:220, en:'weak',     t1:['IC'], doi:'10.1177/2515245918784...'},
  {id:'PDF-0750', title:'Peripersonal space as a multisensory interface', authors:'Serino, A.', year:2019, citations:300, en:'strong',  t1:['EC','MS'], doi:'10.1016/j.neubiorev.2019.01.016'},
  {id:'PDF-0812', title:'Circadian misalignment and cognitive performance in shift workers', authors:'Walker, W. H., et al.', year:2020, citations:700, en:'strong',  t1:['CB','DT'], doi:'10.1038/s41398-020-0694-0'},
  {id:'PDF-0880', title:'Aesthetic response and salience network activity in architectural stimuli', authors:'Vartanian, O., et al.', year:2013, citations:320, en:'moderate', t1:['SN','IC'], doi:'10.1073/pnas...'},
  {id:'PDF-0901', title:'The cybernetic Bayesian brain: Interoceptive inference', authors:'Seth, A. K.', year:2019, citations:800, en:'strong',  t1:['IC','PP'], doi:'10.1098/rstb...'},
  {id:'PDF-0943', title:'Wayfinding in hospital environments: An ethnographic study', authors:'Chen, W., Peng, C.', year:2012, citations:65, en:'moderate', t1:['DP','EC'], doi:'10.1016/j.applergo'},
];

let PAGE_SIZE = 10;
let currentPage = 1;
let filtered = [];

const $ = sel => document.querySelector(sel);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);

function applyFilters(){
  const q = $('#search').value.trim().toLowerCase();
  const yr = $('#yearFilter').value;
  const cite = $('#citationFilter').value;
  const en = $('#enFilter').value;
  const sort = $('#sortBy').value;

  filtered = SAMPLE_ARTICLES.filter(a => {
    if (q){
      const hay = (a.title + ' ' + a.authors + ' ' + a.doi + ' ' + (a.t1||[]).join(' ')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (yr){
      const y = a.year;
      if (yr === '2024-2026'   && !(y >= 2024 && y <= 2026)) return false;
      if (yr === '2020-2023'   && !(y >= 2020 && y <= 2023)) return false;
      if (yr === '2015-2019'   && !(y >= 2015 && y <= 2019)) return false;
      if (yr === '2010-2014'   && !(y >= 2010 && y <= 2014)) return false;
      if (yr === 'before-2010' && !(y < 2010)) return false;
    }
    if (cite){
      const c = a.citations;
      if (cite === '1000+'  && c < 1000)                    return false;
      if (cite === '100-999' && (c < 100 || c > 999))       return false;
      if (cite === '10-99'  && (c < 10  || c > 99))         return false;
      if (cite === 'lt-10'  && c >= 10)                     return false;
    }
    if (en && a.en !== en) return false;
    return true;
  });

  filtered.sort((a,b) => {
    if (sort === 'year-desc')      return b.year - a.year;
    if (sort === 'year-asc')       return a.year - b.year;
    if (sort === 'citations-desc') return b.citations - a.citations;
    if (sort === 'title')          return a.title.localeCompare(b.title);
    return 0;
  });

  currentPage = 1;
  render();
}

function render(){
  const total = filtered.length;
  $('#resultCount').textContent = total;
  const start = (currentPage - 1) * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);

  const results = $('#results');
  if (!total){
    results.innerHTML = `<div class="empty">No articles match these filters. Try clearing one or two.</div>`;
    $('#pagination').innerHTML = '';
    return;
  }

  results.innerHTML = slice.map(a => `
    <article class="art">
      <h3><a href="PNU_ARTICLES/${esc(a.id)}_pnu.html">${esc(a.title)}</a></h3>
      <div class="authors">${esc(a.authors)}</div>
      <div class="meta">
        <span>${esc(a.year)}</span>
        <span class="citations">${a.citations.toLocaleString()} citations</span>
        <span>${esc(a.doi)}</span>
      </div>
      <div class="pills">
        <span class="pill pill-en-${esc(a.en)}">EN: ${esc(a.en)}</span>
        ${(a.t1||[]).map(t => `<span class="pill pill-t1">${esc(t)}</span>`).join('')}
      </div>
    </article>
  `).join('');

  const pages = Math.ceil(total / PAGE_SIZE);
  const pg = $('#pagination');
  if (pages <= 1){ pg.innerHTML = ''; return; }
  let html = `<button onclick="goPage(${Math.max(1, currentPage - 1)})" ${currentPage===1?'disabled':''}>← Prev</button>`;
  for (let p = 1; p <= pages; p++){
    html += `<button class="${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
  }
  html += `<button onclick="goPage(${Math.min(pages, currentPage + 1)})" ${currentPage===pages?'disabled':''}>Next →</button>`;
  pg.innerHTML = html;
}

function goPage(p){ currentPage = p; render(); window.scrollTo({top:0,behavior:'smooth'}); }

['search','yearFilter','citationFilter','enFilter','sortBy'].forEach(id =>
  document.getElementById(id).addEventListener('input', applyFilters));

applyFilters();
</script>
</body>
</html>
