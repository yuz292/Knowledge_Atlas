<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Route — Knowledge Atlas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f4f5f7;
      color: #1f2937;
      min-height: 100vh;
    }

    /* ── Top Bar ──────────────────────────────────────────────────────── */
    .top-bar {
      background: #002d5b;
      color: #fff;
      height: 54px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 14px;
      position: sticky; top: 0; z-index: 200;
    }
    .top-bar-brand {
      font-size: 1.05rem; font-weight: 800;
      text-decoration: none; color: #fff;
      flex-shrink: 0;
    }
    .top-bar-brand span { color: #7dd3fc; }
    .top-bar-back {
      background: rgba(255,255,255,.12);
      color: rgba(255,255,255,.85);
      border: none; border-radius: 6px;
      padding: 5px 12px; cursor: pointer;
      font-size: .82rem;
      text-decoration: none;
      transition: background .14s;
    }
    .top-bar-back:hover { background: rgba(255,255,255,.22); }
    .top-bar-sep { opacity: .4; }
    .top-bar-wf-title {
      font-size: .9rem;
      font-weight: 600;
      opacity: .9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 240px;
    }
    .top-bar-spacer { flex: 1; }
    .top-bar-progress {
      font-size: .78rem;
      opacity: .8;
      flex-shrink: 0;
    }

    /* ── Layout: sidebar steps + main content + collector rail ─────────── */
    .layout {
      display: flex;
      min-height: calc(100vh - 54px - 68px); /* subtract top bar + sticky CTA */
    }

    /* ── Step Sidebar ─────────────────────────────────────────────────── */
    .step-sidebar {
      width: 220px;
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid #e5e7eb;
      padding: 24px 0;
      overflow-y: auto;
    }
    .step-sidebar-label {
      padding: 0 16px 10px;
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #9ca3af;
    }
    .step-nav-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .12s, border-color .12s;
    }
    .step-nav-item:hover { background: #f0f7ff; }
    .step-nav-item.active {
      background: #eff6ff;
      border-left-color: var(--wf-color, #1a56a4);
    }
    .step-nav-item.done {
      opacity: .65;
    }
    .step-num-bubble {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid #d1d5db;
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem; font-weight: 700;
      flex-shrink: 0;
      color: #9ca3af;
      margin-top: 1px;
    }
    .step-nav-item.done .step-num-bubble {
      background: var(--wf-color, #1a56a4);
      border-color: var(--wf-color, #1a56a4);
      color: #fff;
    }
    .step-nav-item.done .step-num-bubble::after { content: '✓'; }
    .step-nav-item.active .step-num-bubble {
      border-color: var(--wf-color, #1a56a4);
      color: var(--wf-color, #1a56a4);
      font-weight: 800;
    }
    .step-nav-text { min-width: 0; }
    .step-nav-title {
      font-size: .84rem;
      font-weight: 600;
      color: #374151;
      line-height: 1.3;
    }
    .step-nav-item.active .step-nav-title { color: var(--wf-color, #1a56a4); }
    .step-nav-page {
      font-size: .73rem;
      color: #9ca3af;
      margin-top: 2px;
    }

    /* ── Main Content ─────────────────────────────────────────────────── */
    .main {
      flex: 1;
      padding: 28px 32px;
      overflow-y: auto;
      min-width: 0;
    }

    /* Workflow hero (shown once at top, above step 1) */
    .wf-hero {
      background: linear-gradient(135deg, var(--wf-color-dark, #002d5b) 0%, var(--wf-color, #1a56a4) 100%);
      color: #fff;
      border-radius: 12px;
      padding: 24px 28px;
      margin-bottom: 28px;
    }
    .wf-hero-badge {
      font-size: .72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      opacity: .8; margin-bottom: 6px;
    }
    .wf-hero-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; }
    .wf-hero-objective {
      font-size: .92rem;
      line-height: 1.6;
      opacity: .9;
      max-width: 600px;
    }
    .wf-hero-meta {
      display: flex; gap: 20px;
      margin-top: 14px;
      font-size: .8rem;
      opacity: .75;
    }
    .wf-hero-note {
      margin-top: 14px;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: .84rem;
      line-height: 1.6;
      max-width: 760px;
    }

    /* Step content */
    .step-panel { display: none; }
    .step-panel.active { display: block; }

    .step-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }
    .step-number-large {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--wf-color, #1a56a4);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 800;
      flex-shrink: 0;
    }
    .step-title-large {
      font-size: 1.35rem;
      font-weight: 800;
      color: #111827;
    }
    .step-page-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--wf-color, #1a56a4);
      color: #fff;
      border-radius: 7px;
      padding: 6px 14px;
      text-decoration: none;
      font-size: .85rem;
      font-weight: 600;
      transition: opacity .14s;
    }
    .step-page-link:hover { opacity: .85; }

    /* Step image panel */
    .step-image-panel {
      background: #fff;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      padding: 28px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 160px;
      position: relative;
      overflow: hidden;
    }
    .step-image-inner {
      text-align: center;
    }
    .step-image-symbol { font-size: 3rem; margin-bottom: 10px; }
    .step-image-label { font-size: .88rem; color: #6b7280; font-weight: 600; }
    /* Background pattern for image panel */
    .step-image-panel::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 20% 50%, var(--wf-color-bg, #eff6ff) 0%, transparent 70%);
      pointer-events: none;
    }

    .step-description {
      font-size: .95rem;
      line-height: 1.7;
      color: #374151;
      margin-bottom: 20px;
    }

    .step-look-for {
      background: #f0fff4;
      border: 1.5px solid #a7f3d0;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 20px;
    }
    .step-look-for h4 {
      font-size: .82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #065f46;
      margin-bottom: 10px;
    }
    .step-look-for ul {
      list-style: none;
      padding: 0;
    }
    .step-look-for li {
      font-size: .9rem;
      color: #1f4038;
      padding: 5px 0;
      padding-left: 20px;
      position: relative;
      line-height: 1.5;
    }
    .step-look-for li::before {
      content: '→';
      position: absolute; left: 0;
      color: #059669;
      font-weight: 700;
    }

    /* Article collector note on collect steps */
    .collect-notice {
      background: #eff6ff;
      border: 1.5px solid #bfdbfe;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: .87rem;
      color: #1e40af;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .collect-notice-icon { font-size: 1.2rem; }
    .collect-notice-text { flex: 1; }
    .collect-open-btn {
      background: #1a56a4; color: #fff;
      border: none; border-radius: 6px;
      padding: 6px 12px; cursor: pointer;
      font-size: .8rem; font-weight: 600;
      white-space: nowrap;
      transition: background .14s;
    }
    .collect-open-btn:hover { background: #154899; }

    /* Reflection box */
    .reflection-box {
      background: #faf5ff;
      border: 1.5px solid #e9d5ff;
      border-radius: 8px;
      padding: 16px 20px;
      margin-top: 20px;
    }
    .reflection-box h4 {
      font-size: .82rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: #6d28d9; margin-bottom: 10px;
    }
    .reflection-box textarea {
      width: 100%;
      border: 1.5px solid #ddd6fe;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: .88rem;
      font-family: inherit;
      resize: vertical;
      min-height: 80px;
      outline: none;
      color: #374151;
    }
    .reflection-box textarea:focus { border-color: #7c3aed; }
    .reflection-save-btn {
      background: #7c3aed; color: #fff;
      border: none; border-radius: 6px;
      padding: 6px 14px; cursor: pointer;
      font-size: .82rem; font-weight: 600;
      margin-top: 8px;
      transition: background .14s;
    }
    .reflection-save-btn:hover { background: #6d28d9; }
    .reflection-saved {
      font-size: .78rem; color: #7c3aed;
      margin-top: 6px; display: none;
    }

    /* ── Right rail ───────────────────────────────────────────────────── */
    .right-rail {
      width: 0;  /* Hidden on small screens; article collector floats */
    }

    /* ── Sticky Bottom CTA ────────────────────────────────────────────── */
    .sticky-cta {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #fff;
      border-top: 1.5px solid #e5e7eb;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 100;
      box-shadow: 0 -4px 20px rgba(0,0,0,.08);
    }
    .sticky-cta-progress {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }
    .progress-bar-wrap {
      flex: 1;
      max-width: 300px;
      height: 6px;
      background: #e5e7eb;
      border-radius: 6px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 6px;
      background: var(--wf-color, #1a56a4);
      transition: width .3s ease;
    }
    .progress-label {
      font-size: .82rem;
      color: #6b7280;
      white-space: nowrap;
    }
    .sticky-cta-actions { display: flex; gap: 8px; }
    .cta-prev-btn {
      background: none;
      border: 1.5px solid #d1d5db;
      color: #374151;
      border-radius: 8px;
      padding: 10px 18px;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 600;
      transition: border-color .14s, color .14s;
    }
    .cta-prev-btn:hover { border-color: var(--wf-color, #1a56a4); color: var(--wf-color, #1a56a4); }
    .cta-prev-btn:disabled { opacity: .35; cursor: default; }
    .cta-next-btn {
      background: var(--wf-color, #1a56a4);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 22px;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 700;
      transition: opacity .14s;
      white-space: nowrap;
    }
    .cta-next-btn:hover { opacity: .88; }
    .cta-next-btn.last { background: #059669; }

    /* ── Error / loading states ───────────────────────────────────────── */
    .error-state {
      text-align: center;
      padding: 60px 24px;
      color: #6b7280;
    }
    .error-state h2 { font-size: 1.2rem; margin-bottom: 8px; color: #374151; }
    .error-state a { color: #1a56a4; }

    /* ── Responsive ──────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .step-sidebar { display: none; }
      .main { padding: 16px; }
      .sticky-cta { padding: 10px 16px; }
      .progress-bar-wrap { display: none; }
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<header class="top-bar">
  <a href="ka_user_home.html" class="top-bar-brand" style="display:flex;align-items:center;gap:8px;">
    <svg viewBox="0 0 32 32" fill="none" style="width:20px;height:20px;">
      <circle cx="16" cy="16" r="3.5" fill="#7dd3fc"/>
      <circle cx="16" cy="5"  r="2.5" fill="#5EEAD4"/>
      <circle cx="27" cy="22" r="2.5" fill="#5EEAD4"/>
      <circle cx="5"  cy="22" r="2.5" fill="#5EEAD4"/>
      <line x1="16" y1="7.5" x2="16" y2="12.5" stroke="#7dd3fc" stroke-width="1.5" stroke-opacity="0.9"/>
      <line x1="24.8" y1="20.2" x2="19.0" y2="17.3" stroke="#7dd3fc" stroke-width="1.5" stroke-opacity="0.9"/>
      <line x1="7.2" y1="20.2" x2="13.0" y2="17.3" stroke="#7dd3fc" stroke-width="1.5" stroke-opacity="0.9"/>
      <line x1="16" y1="7.5" x2="25.5" y2="20" stroke="#fff" stroke-width="0.8" stroke-opacity="0.18"/>
      <line x1="25.5" y1="20" x2="6.5" y2="20" stroke="#fff" stroke-width="0.8" stroke-opacity="0.18"/>
      <line x1="6.5" y1="20" x2="16" y2="7.5" stroke="#fff" stroke-width="0.8" stroke-opacity="0.18"/>
    </svg>
    Knowledge <span>Atlas</span>
  </a>
  <a href="ka_user_home.html" class="top-bar-back">← Recommended Paths</a>
  <span class="top-bar-sep">|</span>
  <span class="top-bar-wf-title" id="top-bar-wf-title">Loading…</span>
  <div class="top-bar-spacer"></div>
  <span class="top-bar-progress" id="top-bar-progress"></span>
</header>

<div class="layout">

  <!-- STEP SIDEBAR -->
  <aside class="step-sidebar" id="step-sidebar" aria-label="Route steps">
    <div class="step-sidebar-label">Steps</div>
    <nav id="step-nav"></nav>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main" id="main-content">
    <div id="error-state" class="error-state" style="display:none">
      <h2>Route not found</h2>
      <p>The path you requested does not exist. <a href="ka_user_home.html">Go back to recommended paths</a>.</p>
    </div>
    <div id="wf-hero" class="wf-hero" style="display:none">
      <div class="wf-hero-badge" id="hero-badge"></div>
      <div class="wf-hero-title" id="hero-title"></div>
      <div class="wf-hero-objective" id="hero-objective"></div>
      <div class="wf-hero-meta" id="hero-meta"></div>
      <div class="wf-hero-note" id="hero-note"></div>
    </div>
    <div id="step-panels-container"></div>
  </main>

</div>

<!-- STICKY BOTTOM CTA -->
<div class="sticky-cta" id="sticky-cta">
  <div class="sticky-cta-progress">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <span class="progress-label" id="progress-label">Step 1 of 1</span>
  </div>
  <div class="sticky-cta-actions">
    <button class="cta-prev-btn" id="cta-prev">Back</button>
    <button class="cta-next-btn" id="cta-next">Next</button>
  </div>
</div>

<script src="ka_workflows.js"></script>
<script src="ka_workspace.js"></script>
<script src="ka_article_collector.js"></script>
<script>
(function () {
  'use strict';

  /* ── Parse URL params ─────────────────────────────────────────────── */
  const params = new URLSearchParams(window.location.search);
  const wfId = params.get('wf') || '';
  let currentStep = parseInt(params.get('step') || '0', 10);
  if (isNaN(currentStep) || currentStep < 0) currentStep = 0;

  const wf = wfId && window.KA_WORKFLOWS ? window.KA_WORKFLOWS.workflows[wfId] : null;

  /* ── Error state ─────────────────────────────────────────────────── */
  if (!wf) {
    document.getElementById('error-state').style.display = 'block';
    document.getElementById('top-bar-wf-title').textContent = 'Route not found';
    document.getElementById('sticky-cta').style.display = 'none';
    window.KA_COLLECTOR.init();
    return;
  }

  /* ── Theme variables ─────────────────────────────────────────────── */
  const color = wf.badgeColor || '#1a56a4';
  // Darken for gradient: roughly subtract 20% luminance
  document.documentElement.style.setProperty('--wf-color', color);
  document.documentElement.style.setProperty('--wf-color-dark', '#002d5b');
  document.documentElement.style.setProperty('--wf-color-bg', color + '18');

  /* ── Top bar ─────────────────────────────────────────────────────── */
  document.getElementById('top-bar-wf-title').textContent = wf.icon + ' ' + wf.title;

  /* ── Hero ────────────────────────────────────────────────────────── */
  const hero = document.getElementById('wf-hero');
  hero.style.display = 'block';
  document.getElementById('hero-badge').textContent = wf.icon + ' ' + wf.badge;
  document.getElementById('hero-title').textContent = wf.title + ' — ' + wf.subtitle;
  document.getElementById('hero-objective').textContent = 'Objective: ' + wf.objective;
  document.getElementById('hero-meta').innerHTML =
    '<span>⏱ ' + wf.estimatedTime + '</span>' +
    '<span>📋 ' + wf.steps.length + ' steps</span>';
  document.getElementById('hero-note').textContent =
    'This is a recommended path, not a requirement. Use Next and Back if you want a guided sequence. You may open other Atlas pages at any time, and your place in this path will still be remembered.';

  /* ── Progress persistence ────────────────────────────────────────── */
  const PROG_KEY = 'ka_wf_progress_' + wfId;
  function loadProgress() {
    try { return JSON.parse(localStorage.getItem(PROG_KEY) || 'null'); } catch (e) { return null; }
  }
  function saveProgress(stepIdx) {
    const p = loadProgress() || { currentStep: 0, notes: {}, lastVisited: 0 };
    p.currentStep = Math.max(p.currentStep || 0, stepIdx);
    p.lastVisited = Date.now();
    try { localStorage.setItem(PROG_KEY, JSON.stringify(p)); } catch (e) {}
  }
  function loadNote(stepId) {
    const p = loadProgress();
    return p && p.notes ? (p.notes[stepId] || '') : '';
  }
  function saveNote(stepId, text) {
    const p = loadProgress() || { currentStep: currentStep, notes: {}, lastVisited: Date.now() };
    p.notes = p.notes || {};
    p.notes[stepId] = text;
    p.lastVisited = Date.now();
    try { localStorage.setItem(PROG_KEY, JSON.stringify(p)); } catch (e) {}
  }

  /* ── Image panel renderer ────────────────────────────────────────── */
  function buildImagePanel(step) {
    const img = window.KA_WORKFLOWS.imageTypes[step.imageType];
    if (!img) return '';
    return '<div class="step-image-panel">' +
      '<div class="step-image-inner">' +
        '<div class="step-image-symbol">' + img.symbol + '</div>' +
        '<div class="step-image-label">' + img.label + '</div>' +
      '</div>' +
    '</div>';
  }

  function buildRoutedLink(targetPath, stepIdx) {
    if (!targetPath) return '';
    try {
      const url = new URL(targetPath, window.location.href);
      url.searchParams.set('wf', wfId);
      url.searchParams.set('step', stepIdx);
      url.searchParams.set('from', 'workflow');
      return url.pathname + url.search;
    } catch (e) {
      return targetPath;
    }
  }

  /* ── Build step panels ───────────────────────────────────────────── */
  const container = document.getElementById('step-panels-container');
  container.innerHTML = wf.steps.map(function (step, i) {
    const safeDesc = step.description.replace(/'/g, '&#39;');
    const routedLink = step.pageLink ? buildRoutedLink(step.pageLink, i) : '';
    const lookForItems = (step.lookFor || []).map(function (lf) {
      return '<li>' + lf + '</li>';
    }).join('');

    const collectNotice = step.collectArticles
      ? '<div class="collect-notice">' +
          '<div class="collect-notice-icon">📚</div>' +
          '<div class="collect-notice-text"><strong>Workspace basket active on this step.</strong> When you find relevant articles on the Atlas pages linked below, save them into your workspace so they remain available for later submission or synthesis.</div>' +
          '<button class="collect-open-btn" onclick="window.KA_COLLECTOR.openPanel()">Open Workspace</button>' +
        '</div>'
      : '';

    return '<div class="step-panel" id="step-panel-' + i + '" data-step-id="' + step.id + '">' +
      '<div class="step-header">' +
        '<div class="step-number-large">' + (i + 1) + '</div>' +
        '<div>' +
          '<div class="step-title-large">' + step.title + '</div>' +
        '</div>' +
        (step.pageLink
          ? '<a href="' + routedLink + '" class="step-page-link" target="_blank" rel="noopener" style="margin-left:auto">Open this step in ' + step.pageName + ' ↗</a>'
          : '') +
      '</div>' +
      buildImagePanel(step) +
      collectNotice +
      '<div class="step-description">' + step.description + '</div>' +
      (lookForItems
        ? '<div class="step-look-for"><h4>What to look for</h4><ul>' + lookForItems + '</ul></div>'
        : '') +
      '<div class="reflection-box">' +
        '<h4>Your notes for this step</h4>' +
        '<textarea id="note-' + step.id + '" placeholder="Jot down observations, surprises, or questions…"></textarea>' +
        '<button class="reflection-save-btn" data-step-id="' + step.id + '">Save note</button>' +
        '<div class="reflection-saved" id="saved-' + step.id + '">Saved ✓</div>' +
      '</div>' +
    '</div>';
  }).join('');

  /* ── Restore saved notes ─────────────────────────────────────────── */
  wf.steps.forEach(function (step) {
    const ta = document.getElementById('note-' + step.id);
    if (ta) ta.value = loadNote(step.id);
    const btn = document.querySelector('[data-step-id="' + step.id + '"]');
    if (btn) {
      btn.addEventListener('click', function () {
        const val = document.getElementById('note-' + step.id).value;
        saveNote(step.id, val);
        const savedEl = document.getElementById('saved-' + step.id);
        savedEl.style.display = 'block';
        setTimeout(function () { savedEl.style.display = 'none'; }, 2000);
      });
    }
  });

  /* ── Step navigation ─────────────────────────────────────────────── */
  function showStep(idx) {
    if (idx < 0) idx = 0;
    if (idx >= wf.steps.length) idx = wf.steps.length - 1;
    currentStep = idx;

    // Hide all panels, show current
    document.querySelectorAll('.step-panel').forEach(function (p) { p.classList.remove('active'); });
    const panel = document.getElementById('step-panel-' + idx);
    if (panel) panel.classList.add('active');

    // Update step nav sidebar
    document.querySelectorAll('.step-nav-item').forEach(function (item, i) {
      item.classList.toggle('active', i === idx);
      item.classList.toggle('done', i < idx);
      const bubble = item.querySelector('.step-num-bubble');
      if (bubble) {
        bubble.textContent = i < idx ? '' : (i + 1);
      }
    });

    // Progress bar
    const pct = wf.steps.length > 1
      ? Math.round((idx / (wf.steps.length - 1)) * 100)
      : 100;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-label').textContent =
      'Step ' + (idx + 1) + ' of ' + wf.steps.length + ': ' + wf.steps[idx].title;
    document.getElementById('top-bar-progress').textContent =
      (idx + 1) + ' / ' + wf.steps.length;

    // CTA buttons
    const prevBtn = document.getElementById('cta-prev');
    const nextBtn = document.getElementById('cta-next');
    prevBtn.disabled = idx === 0;
    const isLast = idx === wf.steps.length - 1;
    const nextStep = wf.steps[idx + 1];
    nextBtn.textContent = isLast ? 'Finish path' : 'Next: ' + (nextStep ? nextStep.title : 'next step') + ' →';
    nextBtn.classList.toggle('last', isLast);

    // Persist progress
    saveProgress(idx);

    // Scroll to top of main
    document.getElementById('main-content').scrollTop = 0;

    // Update URL without reload
    const url = new URL(window.location.href);
    url.searchParams.set('step', idx);
    history.replaceState(null, '', url.toString());
  }

  /* ── Build step sidebar nav ──────────────────────────────────────── */
  const stepNav = document.getElementById('step-nav');
  stepNav.innerHTML = wf.steps.map(function (step, i) {
    return '<div class="step-nav-item" data-idx="' + i + '">' +
      '<div class="step-num-bubble">' + (i + 1) + '</div>' +
      '<div class="step-nav-text">' +
        '<div class="step-nav-title">' + step.title + '</div>' +
        '<div class="step-nav-page">' + (step.pageName || '') + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  stepNav.querySelectorAll('.step-nav-item').forEach(function (item) {
    item.addEventListener('click', function () {
      showStep(parseInt(item.dataset.idx, 10));
    });
  });

  /* ── CTA button handlers ─────────────────────────────────────────── */
  document.getElementById('cta-prev').addEventListener('click', function () {
    showStep(currentStep - 1);
  });
  document.getElementById('cta-next').addEventListener('click', function () {
    if (currentStep < wf.steps.length - 1) {
      showStep(currentStep + 1);
    } else {
      completeWorkflow();
    }
  });

  function completeWorkflow() {
    const p = loadProgress() || {};
    p.currentStep = wf.steps.length;
    p.completedAt = new Date().toISOString();
    p.lastVisited = Date.now();
    try { localStorage.setItem(PROG_KEY, JSON.stringify(p)); } catch (e) {}

    // Show completion panel
    const container2 = document.getElementById('step-panels-container');
    document.querySelectorAll('.step-panel').forEach(function (p2) { p2.classList.remove('active'); });

    const collector = window.KA_COLLECTOR ? window.KA_COLLECTOR.getAll() : [];
    const collectorNote = collector.length > 0
      ? '<div style="background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:8px;padding:14px 18px;margin-bottom:16px">' +
          '<strong style="color:#1a56a4">📚 ' + collector.length + ' article(s) collected.</strong> ' +
          '<a href="ka_article_propose.html" style="color:#1a56a4;font-weight:600">Submit them to ATLAS →</a>' +
        '</div>'
      : '';

    const doneEl = document.createElement('div');
    doneEl.style.cssText = 'text-align:center;padding:60px 24px;max-width:480px;margin:0 auto';
    doneEl.innerHTML =
      '<div style="font-size:3.5rem;margin-bottom:16px">' + wf.icon + '</div>' +
      '<h2 style="font-size:1.5rem;font-weight:800;color:#111827;margin-bottom:8px">Route complete!</h2>' +
      '<p style="color:#6b7280;line-height:1.6;margin-bottom:20px">' +
        'You have finished <strong>' + wf.title + '</strong>. Your notes and saved workspace items are ready for review, export, or submission.' +
      '</p>' +
      collectorNote +
      '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">' +
        '<a href="ka_user_home.html" style="background:#002d5b;color:#fff;border-radius:8px;padding:10px 20px;text-decoration:none;font-weight:700;font-size:.9rem">← Back to Recommended Paths</a>' +
        '<a href="ka_my_work.html" style="background:#fff;color:#1C3D3A;border:1px solid #CBBCA8;border-radius:8px;padding:10px 20px;text-decoration:none;font-weight:700;font-size:.9rem">Open My Work</a>' +
        '<a href="ka_article_propose.html" style="background:' + color + ';color:#fff;border-radius:8px;padding:10px 20px;text-decoration:none;font-weight:700;font-size:.9rem">Submit Articles →</a>' +
      '</div>';
    container2.appendChild(doneEl);

    document.getElementById('sticky-cta').style.display = 'none';
  }

  /* ── Initial render ──────────────────────────────────────────────── */
  // Clamp currentStep from URL to valid range
  const savedProgress = loadProgress();
  const maxStep = savedProgress ? savedProgress.currentStep : 0;
  if (currentStep > maxStep) currentStep = maxStep; // don't skip ahead
  showStep(currentStep);

  /* ── Article collector ───────────────────────────────────────────── */
  window.KA_COLLECTOR.init();

})();
</script>
